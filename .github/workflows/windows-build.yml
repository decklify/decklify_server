name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v6

      # 2. Setup Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # 3. Build Svelte UI
      - name: Build Svelte UI
        working-directory: ./decklify-ui
        run: |
          bun install
          bun run build

      # 4. Install uv
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # 5. Install dependencies
      - name: Install dependencies
        run: uv sync

      # 6. Install Inno Setup
      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      # 7. Build with PyInstaller
      - name: Build EXE
        run: |
          .venv\Scripts\python -m PyInstaller decklify.spec

      # 8. Build installer
      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      # 9. Upload artifact (always useful)
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: decklify-installer
          path: Output/*.exe

      # 10. Attach to GitHub Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}